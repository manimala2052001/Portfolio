<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mani | Graphic Designer</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background: #f8f8fb;
        color: #333;
      }

      header {
        text-align: center;
        padding: 40px 20px;
        background: #e8e4f2;
      }

      header h1 {
        font-size: 32px;
        font-weight: 600;
      }

      header p {
        margin-top: 10px;
        font-size: 16px;
        color: #555;
      }

      .container {
        width: 90%;
        max-width: 1000px;
        margin: 40px auto;
      }

      .section-title {
        font-size: 22px;
        margin-bottom: 20px;
        border-left: 4px solid #6c5ce7;
        padding-left: 10px;
      }

      .projects {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
      }

      .card {
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-5px);
      }

      .card img {
        width: 100%;
        height: 300px;
        object-fit: cover;
      }

      .card-content {
        padding: 15px;
      }

      .card-content h3 {
        font-size: 16px;
        margin-bottom: 8px;
      }

      .card-content p {
        font-size: 14px;
        color: #666;
      }

      footer {
        text-align: center;
        padding: 20px;
        background: #e8e4f2;
        margin-top: 40px;
      }

      footer p {
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Mani</h1>
      <p>Graphic Designer | Social Media Posters | Jewellery & Saree Ads</p>
    </header>

    <div class="container">
      <h2 class="section-title">My Best Works</h2>

      <div class="projects">
        <!-- PROJECT 1 -->
        <div class="card">
          <img src="./images/jewellery.png" alt="Jewellery Ad" />
          <div class="card-content">
            <h3>Elegant Jewellery Ad</h3>
            <p>Luxury gold jewellery social media advertisement design.</p>
          </div>
        </div>

        <!-- PROJECT 2 -->
        <div class="card">
          <img src="./images/saree.png" alt="Saree Poster" />
          <div class="card-content">
            <h3>Silk Saree Poster</h3>
            <p>Traditional silk saree festive collection poster.</p>
          </div>
        </div>
      </div>
    </div>

    <footer>
      <p>Contact: yourmail@gmail.com | Instagram: @yourpage</p>
    </footer>
  </body>
</html>
